<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Voice & Clips Downloader</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body class="popup-body">
    <main class="popup">
      <h1 class="popup__title">VK Voice &amp; Clips Downloader</h1>
      <section class="popup__card">
        <div class="popup__copy">
          <strong>Переключатели</strong>
          <span>Выбирайте, что скачивать:</span>
        </div>
      </section>
      <section class="popup__card popup__card--stacked">
        <div class="popup__row">
          <div class="popup__copy">
            <strong>Голосовые</strong>
            <span>Кнопки у голосовых сообщений</span>
          </div>
          <label class="toggle" aria-label="Переключить голосовые сообщения">
            <input id="voiceToggle" type="checkbox">
            <span class="toggle__slider"></span>
          </label>
        </div>
        <div class="popup__divider"></div>
        <div class="popup__row">
          <div class="popup__copy">
            <strong>Клипы</strong>
            <span>Кнопки на карточках VK Clips</span>
          </div>
          <label class="toggle" aria-label="Переключить клипы">
            <input id="clipsToggle" type="checkbox">
            <span class="toggle__slider"></span>
          </label>
        </div>
      </section>
      <p id="status" class="popup__status" aria-live="polite">Состояние загружается...</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
